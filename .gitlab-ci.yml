stages:
  - build
  - deploy

variables:
  VUE_APP_API_URL: "$API_GATEWAY_URL"  # This will be replaced with the actual URL

build-fastapi:
  stage: build
  script:
    - cd backend && python bootstrap.py
  artifacts:
    paths:
      - backend/fastapi.zip

build-frontend:
  stage: build
  script:
    - cd frontend
    - ~/.nvm/versions/node/v20.17.0/bin/npm install
    - npm run build
  artifacts:
    paths:
      - frontend/dist

deploy-frontend:
  stage: deploy
  script:
    - cd frontend
    - npm run build
    - aws s3 sync dist/ s3://nws-vue-frontend-bucket --delete
    - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_ID --paths "/*"
  variables:
    CLOUDFRONT_ID: "E2F30NB03WULVQ"  # From your outputs

deploy-terraform:
  stage: deploy
  script:
    - cd terraform
    - terraform init
    - terraform apply -auto-approve
    # Force CloudFront cache invalidation
    - |
      DISTRIBUTION_ID=$(terraform output -raw cloudfront_distribution_id)
      aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"
    # Generate environment file
    - |
      cat > ../api_url.env <<EOF
      API_GATEWAY_URL=$(terraform output -raw api_url)
      FRONTEND_URL=$(terraform output -raw frontend_url)
      CLOUDFRONT_ID=$(terraform output -raw cloudfront_distribution_id)
      EOF
  artifacts:
    reports:
      dotenv: ../api_url.env
stages:
  - build
  - deploy

variables:
  VUE_APP_API_URL: "$API_GATEWAY_URL"

build-fastapi:
  stage: build
  script:
    - cd backend && python bootstrap.py
  artifacts:
    paths:
      - backend/fastapi.zip

build-frontend:
  stage: build
  image: node:20.17.0
  script:
    - cd frontend
    - npm install
    - npm run build
  artifacts:
    paths:
      - frontend/dist

deploy-terraform:
  stage: deploy
  script:
    - cd terraform
    - terraform init
    - terraform apply -auto-approve
    - >-
      cat > ../output.env <<EOF
      API_GATEWAY_URL=$(terraform output -raw api_url)
      FRONTEND_URL=$(terraform output -raw frontend_url)
      CLOUDFRONT_ID=$(terraform output -raw cloudfront_distribution_id)
      S3_BUCKET_NAME=$(terraform output -raw s3_bucket_name)
      EOF
  artifacts:
    reports:
      dotenv: ../output.env

deploy-frontend:
  stage: deploy
  needs:
    - build-frontend
    - deploy-terraform
  script:
    - echo "Deploying to bucket $S3_BUCKET_NAME"
    - aws s3 sync frontend/dist/ s3://$S3_BUCKET_NAME --delete
    - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_ID --paths "/*"
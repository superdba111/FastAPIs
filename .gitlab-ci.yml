stages:
  - build
  - deploy

variables:
  # REMOVED: VUE_APP_API_URL: "$API_GATEWAY_URL"
  # This variable will now be set dynamically by the 'deploy-terraform' job via dotenv artifacts.
  PROJECT_ROOT: "${CI_PROJECT_DIR}" # GitLab predefined variable for project directory

build-fastapi:
  stage: build
  script:
    - cd "${PROJECT_ROOT}/backend" && python bootstrap.py
  artifacts:
    paths:
      - "${PROJECT_ROOT}/backend/fastapi.zip"

build-frontend:
  stage: build
  image: node:20.17.0
  # ADDED: This job now explicitly depends on 'deploy-terraform'
  # to ensure its dotenv artifacts (including VUE_APP_API_URL) are available.
  needs:
    - job: deploy-terraform
      artifacts: true
  script:
    - cd "${PROJECT_ROOT}/frontend"
    - npm install
    # VUE_APP_API_URL will be available as an environment variable here,
    # overriding any .env file in the frontend directory during the build.
    - npm run build
  artifacts:
    paths:
      - "${PROJECT_ROOT}/frontend/dist"

deploy-terraform:
  stage: deploy
  script:
    - echo "Current directory is ${PROJECT_ROOT}"
    - cd "${PROJECT_ROOT}/terraform"
    - terraform init
    - terraform apply -auto-approve
    - |
      cat > "${PROJECT_ROOT}/output.env" <<EOF
      API_GATEWAY_URL=$(terraform output -raw api_url)
      FRONTEND_URL=$(terraform output -raw frontend_url)
      CLOUDFRONT_ID=$(terraform output -raw cloudfront_distribution_id)
      S3_BUCKET_NAME=$(terraform output -raw s3_bucket_name)
      VUE_APP_API_URL=$(terraform output -raw api_url) # ADDED: This line makes it available for the frontend build
      EOF
    - echo "Verifying output.env:"
    - cat "${PROJECT_ROOT}/output.env"
  artifacts:
    reports:
      dotenv: "${PROJECT_ROOT}/output.env"

deploy-frontend:
  stage: deploy
  needs:
    - job: build-frontend
      artifacts: true
    - job: deploy-terraform
      artifacts: true
  script:
    - echo "Deploying to bucket is ${S3_BUCKET_NAME}"
    - aws s3 sync "${PROJECT_ROOT}/frontend/dist/" "s3://${S3_BUCKET_NAME}" --delete
    - aws cloudfront create-invalidation --distribution-id "${CLOUDFRONT_ID}" --paths "/*"
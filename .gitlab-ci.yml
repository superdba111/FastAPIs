stages:
  - provision
  - build
  - deploy

variables:
  PROJECT_ROOT: "${CI_PROJECT_DIR}"

# Moved to 'provision' stage so fastapi.zip is available for terraform
build-fastapi:
  stage: provision # CHANGED STAGE
  script:
    - cd "${PROJECT_ROOT}/backend" && python bootstrap.py
  artifacts:
    paths:
      - "${PROJECT_ROOT}/backend/fastapi.zip" # This artifact will now be available to subsequent jobs, including deploy-terraform

# deploy-terraform now needs artifacts from build-fastapi
deploy-terraform:
  stage: provision
  needs:
    - job: build-fastapi # ADDED: Needs fastapi.zip to exist
      artifacts: true
  script:
    - echo "Current directory is ${PROJECT_ROOT}"
    - cd "${PROJECT_ROOT}/terraform"
    - terraform init
    - terraform apply -auto-approve
    - |
      cat > "${PROJECT_ROOT}/output.env" <<EOF
      API_GATEWAY_URL=$(terraform output -raw api_url)
      FRONTEND_URL=$(terraform output -raw frontend_url)
      CLOUDFRONT_ID=$(terraform output -raw cloudfront_distribution_id)
      S3_BUCKET_NAME=$(terraform output -raw s3_bucket_name)
      VUE_APP_API_URL=$(terraform output -raw api_url)
      EOF
    - echo "Verifying output.env:"
    - cat "${PROJECT_ROOT}/output.env"
  artifacts:
    reports:
      dotenv: "${PROJECT_ROOT}/output.env"

# build-frontend still needs deploy-terraform for VUE_APP_API_URL
build-frontend:
  stage: build
  image: node:20.17.0
  needs:
    - job: deploy-terraform
      artifacts: true
  script:
    - cd "${PROJECT_ROOT}/frontend"
    - npm install
    - npm run build
  artifacts:
    paths:
      - "${PROJECT_ROOT}/frontend/dist"

deploy-frontend:
  stage: deploy
  needs:
    - job: build-frontend
      artifacts: true
    - job: deploy-terraform
      artifacts: true
  script:
    - echo "Deploying to bucket is ${S3_BUCKET_NAME}"
    - aws s3 sync "${PROJECT_ROOT}/frontend/dist/" "s3://${S3_BUCKET_NAME}" --delete
    - aws cloudfront create-invalidation --distribution-id "${CLOUDFRONT_ID}" --paths "/*"